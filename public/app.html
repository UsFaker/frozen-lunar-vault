<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frozen Lunar Vault</title>
    <link rel="stylesheet" href="css/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="app-layout">
        <aside class="sidebar">
            <div class="logo">🌌 <span>界域</span></div>
            <nav class="nav-links">
                <a href="#" class="active" data-tab="account">🔑 账号密码</a>
                <a href="#" data-tab="note">📝 随笔</a>
                <a href="#" data-tab="record">📋 记录</a>
                <a href="#" data-tab="tech">💻 代码/配置</a>
            </nav>
            <div class="sidebar-footer">
                <button id="lock-btn">🔒 锁定系统</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <h1 id="page-title">账号密码</h1>
                <div class="search-wrap">
                    <input type="text" id="search-input" placeholder="检索...">
                </div>
            </header>

            <div class="content-grid" id="entries-grid">
                <!-- Entries generated here -->
            </div>

            <button class="fab" id="add-fab" title="新增">+</button>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="entry-modal">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2 id="modal-title">新增</h2>
                <button class="close-btn" id="close-modal">×</button>
            </div>
            <form id="entry-form">
                <!-- Dynamic form fields injected by JS depending on category -->
                <div id="dynamic-fields"></div>
                <div class="modal-actions">
                    <button type="submit" class="btn primary">保存</button>
                    <button type="button" class="btn danger" id="delete-btn" style="display: none;">删除</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Global Toast -->
    <div id="toast" class="toast">Message</div>

    <script src="js/crypto.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
